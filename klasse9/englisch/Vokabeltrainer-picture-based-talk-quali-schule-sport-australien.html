<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Based Talk - Vokabeltrainer Quali</title>
  <style>
    :root{
      --bg-1:#f3f7ff;
      --bg-2:#eef8f3;
      --card:#ffffff;
      --text:#163047;
      --muted:#5d7388;
      --line:#d7e1ee;
      --shadow:0 18px 50px rgba(20,42,67,0.10);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:16px;
      --school-1:#1d4ed8;
      --school-2:#8dd3ff;
      --sport-1:#0f766e;
      --sport-2:#9adf86;
      --australia-1:#c2410c;
      --australia-2:#ffcb74;
      --good:#18794e;
      --good-bg:#ecfbf2;
      --bad:#b42318;
      --bad-bg:#fff1f1;
      --soft:#f7fbff;
    }

    *{box-sizing:border-box;}

    html{scroll-behavior:smooth;}

    body{
      margin:0;
      font-family:"Trebuchet MS","Segoe UI",Verdana,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(141,211,255,0.35), transparent 28%),
        radial-gradient(circle at top right, rgba(154,223,134,0.22), transparent 25%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      min-height:100vh;
    }

    .shell{
      max-width:1300px;
      margin:0 auto;
      padding:26px 18px 60px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, rgba(255,255,255,0.95), rgba(240,248,255,0.92));
      border:1px solid rgba(255,255,255,0.85);
      box-shadow:var(--shadow);
      border-radius:var(--radius-xl);
      padding:30px;
      margin-bottom:24px;
    }

    .hero::before,
    .hero::after{
      content:"";
      position:absolute;
      border-radius:50%;
      pointer-events:none;
    }

    .hero::before{
      width:260px;
      height:260px;
      right:-80px;
      top:-80px;
      background:radial-gradient(circle, rgba(59,130,246,0.18), transparent 65%);
    }

    .hero::after{
      width:220px;
      height:220px;
      left:-60px;
      bottom:-110px;
      background:radial-gradient(circle, rgba(245,158,11,0.14), transparent 65%);
    }

    h1,h2,h3,h4{margin:0;}

    h1{
      font-size:clamp(2rem, 3.5vw, 3.2rem);
      line-height:1.08;
      margin-bottom:14px;
    }

    h2{font-size:1.6rem; margin-bottom:8px;}
    h3{font-size:1.15rem; margin-bottom:10px;}
    h4{font-size:1rem; margin-bottom:8px;}

    p{line-height:1.6; margin:0;}

    .subtitle{
      max-width:860px;
      font-size:1.04rem;
      color:var(--muted);
    }

    .info-card,
    .mini-card,
    .topic-stage,
    .panel-card,
    .side-card,
    .exercise-card{
      background:rgba(255,255,255,0.93);
      border:1px solid rgba(214,226,240,0.95);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
    }

    .info-card{
      padding:18px 20px;
    }

    .badge-row,
    .stat-row,
    .phase-nav,
    .topic-nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      background:#f3f8ff;
      color:#29517d;
      border:1px solid #d7e6f8;
      font-weight:700;
      font-size:0.95rem;
    }

    .topic-nav{
      margin:22px 0;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
      gap:14px;
    }

    .topic-btn,
    .phase-btn,
    .action-btn,
    .option-btn,
    .chip,
    .ghost-btn{
      appearance:none;
      border:none;
      cursor:pointer;
      font:inherit;
      transition:transform 0.14s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .topic-btn{
      position:relative;
      overflow:hidden;
      padding:18px 18px 16px;
      text-align:left;
      border-radius:22px;
      color:#fff;
      min-height:118px;
      box-shadow:var(--shadow);
    }

    .topic-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(140deg, rgba(255,255,255,0.18), transparent 55%);
      pointer-events:none;
    }

    .topic-btn span{
      display:block;
      position:relative;
      z-index:1;
    }

    .topic-btn .emoji{
      font-size:2rem;
      margin-bottom:10px;
    }

    .topic-btn .title{
      font-size:1.18rem;
      font-weight:800;
    }

    .topic-btn .sub{
      margin-top:6px;
      font-size:0.93rem;
      color:rgba(255,255,255,0.88);
    }

    .topic-btn:hover,
    .phase-btn:hover,
    .action-btn:hover,
    .option-btn:hover,
    .chip:hover,
    .ghost-btn:hover{
      transform:translateY(-2px);
    }

    .topic-btn.active{
      outline:4px solid rgba(255,255,255,0.75);
      outline-offset:-4px;
    }

    .topic-btn.school{background:linear-gradient(135deg, var(--school-1), var(--school-2));}
    .topic-btn.sport{background:linear-gradient(135deg, var(--sport-1), var(--sport-2));}
    .topic-btn.australia{background:linear-gradient(135deg, var(--australia-1), var(--australia-2));}

    .topic-stage{
      padding:22px;
    }

    .theme-school{--theme-1:var(--school-1);--theme-2:var(--school-2);}
    .theme-sport{--theme-1:var(--sport-1);--theme-2:var(--sport-2);}
    .theme-australia{--theme-1:var(--australia-1);--theme-2:var(--australia-2);}

    .stage-banner{
      padding:24px;
      border-radius:26px;
      background:linear-gradient(135deg, var(--theme-1), var(--theme-2));
      color:#fff;
      position:relative;
      overflow:hidden;
      min-height:240px;
    }

    .stage-banner::after{
      content:"";
      position:absolute;
      width:210px;
      height:210px;
      right:-45px;
      bottom:-80px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,0.3), transparent 65%);
    }

    .stage-banner .label{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.18);
      font-weight:700;
      margin-bottom:16px;
    }

    .stage-banner h2{
      font-size:clamp(1.7rem, 3vw, 2.4rem);
      margin-bottom:10px;
    }

    .stage-banner p{
      max-width:570px;
      color:rgba(255,255,255,0.93);
      margin-bottom:16px;
    }

    .stat-row{
      margin-top:14px;
    }

    .stat-pill{
      padding:9px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.22);
      font-weight:700;
    }

    .phase-nav{
      margin:18px 0 20px;
    }

    .phase-btn{
      padding:12px 16px;
      border-radius:14px;
      font-weight:800;
      background:#eef5ff;
      color:#2e4f74;
      border:1px solid #d7e5f6;
    }

    .phase-btn.active{
      background:linear-gradient(135deg, var(--theme-1), var(--theme-2));
      color:#fff;
      border-color:transparent;
    }

    .panel-grid{
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      gap:18px;
    }

    .panel-card,
    .side-card,
    .exercise-card{
      padding:20px;
    }

    .panel-card.soft{
      background:linear-gradient(180deg, #ffffff, #f8fbff);
    }

    .progress-wrap{
      margin:14px 0 8px;
    }

    .progress-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      color:var(--muted);
      font-size:0.95rem;
      font-weight:700;
    }

    .progress-bar{
      width:100%;
      height:12px;
      border-radius:999px;
      background:#eaf1fb;
      overflow:hidden;
    }

    .progress-bar > div{
      height:100%;
      width:0;
      border-radius:999px;
      background:linear-gradient(90deg, var(--theme-2), var(--theme-1));
      transition:width 0.25s ease;
    }

    .flash-card .tiny{
      color:var(--muted);
      font-size:0.92rem;
      margin-bottom:12px;
      font-weight:700;
      letter-spacing:0.03em;
      text-transform:uppercase;
    }

    .flash-main{
      font-size:clamp(2rem, 4vw, 3rem);
      font-weight:900;
      line-height:1.12;
      margin-bottom:12px;
    }

    .flash-translation{
      font-size:1.28rem;
      min-height:1.5em;
      color:var(--muted);
      margin-bottom:16px;
    }

    .single-panel{
      display:grid;
      gap:18px;
    }

    .flip-shell{
      perspective:1200px;
      margin-top:14px;
    }

    .flip-card{
      position:relative;
      min-height:330px;
      transform-style:preserve-3d;
      transition:transform 0.7s ease;
      cursor:pointer;
    }

    .flip-card.flipped{
      transform:rotateY(180deg);
    }

    .flip-face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:24px;
      border:1px dashed #cbdced;
      padding:26px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:
        linear-gradient(180deg, #ffffff, #f7fbff),
        radial-gradient(circle at top right, rgba(59,130,246,0.08), transparent 35%);
    }

    .flip-back{
      transform:rotateY(180deg);
      background:
        linear-gradient(180deg, #ffffff, #f5fbf8),
        radial-gradient(circle at top right, rgba(16,185,129,0.10), transparent 35%);
    }

    .flip-hint{
      margin-top:14px;
      color:var(--muted);
      font-size:0.96rem;
      font-weight:700;
    }

    .example-box{
      width:100%;
      max-width:660px;
      background:#f6faff;
      border:1px solid #d7e4f4;
      border-radius:16px;
      padding:14px 16px;
      font-weight:700;
      color:#33506c;
    }

    .control-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .action-btn,
    .ghost-btn{
      padding:11px 15px;
      border-radius:14px;
      font-weight:800;
    }

    .action-btn{
      background:linear-gradient(135deg, var(--theme-1), var(--theme-2));
      color:#fff;
      box-shadow:0 14px 30px rgba(0,0,0,0.09);
    }

    .ghost-btn{
      background:#ffffff;
      color:#2d4c6b;
      border:1px solid #d6e2f1;
    }

    .overview-grid,
    .exercise-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:18px;
    }

    .overview-list,
    .speaking-list{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .overview-item,
    .speaking-item{
      padding:12px 14px;
      border-radius:16px;
      background:#f7fbff;
      border:1px solid #dbe7f5;
      font-weight:700;
    }

    .tip-box{
      margin-top:14px;
      padding:14px 16px;
      border-radius:18px;
      background:#fff9ec;
      border:1px solid #f6dfab;
      color:#7b5a13;
      font-weight:700;
    }

    .exercise-grid{
      margin-top:4px;
    }

    .question-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      margin-bottom:12px;
      color:var(--muted);
      font-weight:700;
    }

    .question-title{
      font-size:1.08rem;
      font-weight:900;
      color:var(--text);
      line-height:1.4;
      margin-bottom:12px;
    }

    .options{
      display:grid;
      gap:10px;
    }

    .option-btn{
      width:100%;
      text-align:left;
      padding:12px 13px;
      border-radius:14px;
      background:#f7fbff;
      color:#29455f;
      border:1px solid #d6e3f1;
      font-weight:700;
    }

    .option-btn.correct{
      background:var(--good-bg);
      color:var(--good);
      border-color:#b9ebc9;
    }

    .option-btn.wrong{
      background:var(--bad-bg);
      color:var(--bad);
      border-color:#f3c0c0;
    }

    .feedback{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
    }

    .feedback.good{
      background:var(--good-bg);
      color:var(--good);
      border:1px solid #b9ebc9;
    }

    .feedback.bad{
      background:var(--bad-bg);
      color:var(--bad);
      border:1px solid #f3c0c0;
    }

    .match-table{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .match-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      align-items:center;
    }

    .match-label{
      padding:11px 12px;
      border-radius:14px;
      background:#f7fbff;
      border:1px solid #dae7f4;
      font-weight:800;
    }

    .input,
    .select{
      width:100%;
      padding:12px 13px;
      border-radius:14px;
      border:1px solid #cfddec;
      background:#fff;
      color:var(--text);
      font:inherit;
    }

    .input:disabled{
      background:#f4f8fc;
      color:#688096;
      cursor:not-allowed;
    }

    .tiny-note{
      margin-top:8px;
      color:var(--muted);
      font-size:0.94rem;
    }

    .builder-area{
      margin-top:12px;
      display:grid;
      gap:12px;
    }

    .word-bank,
    .built-bank{
      min-height:64px;
      padding:12px;
      border-radius:16px;
      background:#fbfdff;
      border:1px dashed #cddbea;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:flex-start;
    }

    .chip{
      padding:9px 12px;
      border-radius:999px;
      background:#fff;
      color:#26435f;
      border:1px solid #d7e4f3;
      font-weight:800;
    }

    .built-bank.empty::before{
      content:"Baue hier deinen Satz zusammen.";
      color:#7b8da0;
      font-weight:700;
    }

    .score-strip{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }

    .score-pill{
      padding:9px 12px;
      border-radius:999px;
      background:#ffffff;
      border:1px solid #d8e4f1;
      font-weight:800;
      color:#31506e;
    }

    .model-answer{
      margin-top:14px;
      padding:16px;
      border-radius:18px;
      background:#f8fbff;
      border:1px solid #dce8f6;
    }

    .model-answer p + p{
      margin-top:10px;
    }

    .speak-card{
      max-width:760px;
    }

    .translate-prompt{
      padding:16px 18px;
      border-radius:18px;
      background:#f7fbff;
      border:1px solid #d8e5f3;
      margin:12px 0 14px;
    }

    .translate-prompt strong{
      display:block;
      margin-bottom:6px;
      font-size:1.05rem;
    }

    .simple-note{
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      background:#f8fbff;
      border:1px solid #d9e5f3;
      color:#32506e;
      font-weight:700;
    }

    .footer{
      text-align:center;
      color:var(--muted);
      margin-top:28px;
      font-size:0.95rem;
    }

    @media (max-width:1050px){
      .panel-grid,
      .overview-grid,
      .exercise-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:700px){
      .shell{padding:18px 12px 46px;}
      .hero{padding:22px 18px;}
      .topic-stage,
      .panel-card,
      .side-card,
      .exercise-card{padding:16px;}
      .match-row{grid-template-columns:1fr;}
      .flash-main{font-size:1.8rem;}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const topics = [
      {
        id: "school",
        themeClass: "theme-school",
        buttonClass: "school",
        icon: "🏫",
        title: "School",
        subtitle: "classroom, subjects, school day",
        intro: "Dieses Thema hilft dir, Schule, Unterricht und deinen Schulalltag auf Englisch sicher zu beschreiben.",
        sceneTitle: "Bildideen für deinen Talk",
        sceneItems: [
          "a classroom with students and a teacher",
          "school things like books, pens and a board",
          "students learning, writing and working together"
        ],
        focusFields: [
          "classroom and people",
          "subjects and school routine",
          "activities in the lesson",
          "your opinion about school"
        ],
        talkSteps: [
          "Say where the scene takes place.",
          "Describe the students and the teacher.",
          "Name school subjects or activities.",
          "Add your own opinion about school."
        ],
        examTip: "Nützliche Satzstarter sind: In the picture I can see..., The students are..., The teacher is..., My favourite subject is... because...",
        vocab: [
          { de: "die Schule", en: "school", example: "Our school is near the sports centre." },
          { de: "das Klassenzimmer", en: "classroom", example: "The classroom is bright and clean." },
          { de: "der Stundenplan", en: "timetable", example: "I check my timetable every morning." },
          { de: "das Fach", en: "subject", example: "English is an important subject." },
          { de: "Mathe", en: "maths", example: "We have maths on Monday." },
          { de: "Englisch", en: "English", example: "In English we often speak in pairs." },
          { de: "die Pause", en: "break", example: "During the break I talk to my friends." },
          { de: "der Schulhof", en: "playground", example: "Many students are in the playground." },
          { de: "der Lehrer", en: "teacher", example: "The teacher explains the new task." },
          { de: "die Hausaufgabe", en: "homework", example: "I do my homework after lunch." },
          { de: "der Test", en: "test", example: "We are writing a test today." },
          { de: "die Prüfung", en: "exam", example: "An exam is usually longer than a test." },
          { de: "lernen", en: "to study", example: "I study for the test in the evening." },
          { de: "aufzeigen", en: "to put up your hand", example: "Please put up your hand before you speak." },
          { de: "abschreiben", en: "to copy", example: "You must not copy from other students." },
          { de: "erklären", en: "to explain", example: "Our teacher explains grammar very well." },
          { de: "fragen", en: "to ask", example: "You can ask a question at any time." },
          { de: "antworten", en: "to answer", example: "She is ready to answer the question." },
          { de: "schwierig", en: "difficult", example: "This exercise looks difficult." },
          { de: "einfach", en: "easy", example: "The first task is quite easy." },
          { de: "interessant", en: "interesting", example: "History can be very interesting." },
          { de: "langweilig", en: "boring", example: "Long worksheets are sometimes boring." },
          { de: "die Tafel", en: "board", example: "The homework is written on the board." },
          { de: "das Heft", en: "exercise book", example: "Write the sentence in your exercise book." },
          { de: "der Stift", en: "pen", example: "I need a blue pen for this task." },
          { de: "das Lineal", en: "ruler", example: "Use a ruler for the diagram." },
          { de: "das Buch", en: "book", example: "My book is open on the desk." },
          { de: "die Schultasche", en: "school bag", example: "My school bag is very heavy today." },
          { de: "pünktlich", en: "on time", example: "I usually arrive on time." },
          { de: "zu spät", en: "late", example: "He is late for school again." },
          { de: "der Computer", en: "computer", example: "We use the computer in IT lessons." },
          { de: "die Gruppenarbeit", en: "group work", example: "Group work can be fun and helpful." },
          { de: "der Stundenbeginn", en: "start of the lesson", example: "At the start of the lesson everybody is quiet." },
          { de: "das Lieblingsfach", en: "favourite subject", example: "Art is my favourite subject." },
          { de: "der Sitzplatz", en: "seat", example: "My seat is next to the window." },
          { de: "der Aufsatz", en: "essay", example: "We have to write an essay about our weekend." }
        ],
        starterPhrases: [
          "In the picture I can see a classroom.",
          "The students are sitting at their desks.",
          "The teacher is standing in front of the board.",
          "They are learning together.",
          "My favourite subject is English because it is interesting."
        ],
        questions: [
          "What subjects do you like at school?",
          "What can you see in a classroom?",
          "What do students do during the break?",
          "Do you like group work? Why?",
          "Why is school important?"
        ],
        translationPractice: [
          { de: "Auf dem Bild kann ich ein Klassenzimmer sehen.", en: "In the picture I can see a classroom." },
          { de: "Die Schüler sitzen an ihren Tischen und hören dem Lehrer zu.", en: "The students are sitting at their desks and listening to the teacher." },
          { de: "Heute haben wir Mathe und Englisch.", en: "Today we have maths and English." },
          { de: "An der Tafel steht die Hausaufgabe.", en: "The homework is written on the board." },
          { de: "In der Pause gehe ich gern auf den Schulhof.", en: "During the break I like to go to the playground." },
          { de: "Mein Lieblingsfach ist Englisch, weil es interessant ist.", en: "My favourite subject is English because it is interesting." },
          { de: "Ich lerne am Nachmittag für einen Test.", en: "I study for a test in the afternoon." },
          { de: "Unsere Lehrerin erklärt die Aufgabe sehr gut.", en: "Our teacher explains the task very well." }
        ],
        modelAnswer: [
          "In the picture I can see a classroom at school. There are several students and one teacher.",
          "The students are sitting at their desks, writing in their exercise books and listening carefully. The teacher is standing in front of the board.",
          "I like school when the lessons are interesting, especially English and art."
        ],
        sentences: [

    const phaseLabels = {
      learn: "1. Vokabelkarten",
      practice: "2. Übungen",
      speak: "3. Sprechen & Übersetzen"

    const appState = {
      activeTopic: topics[0].id,
      topics: {}
    };

    function shuffle(array){
      const copy = [...array];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function uniqueValues(items){
      return [...new Set(items)];
    }

    function normalize(text){
      return text
        .toLowerCase()
        .trim()
        .replace(/[.,!?]/g, "")
        .replace(/\s+/g, " ");
    }

    function composeSentence(tokens){
      return tokens.map(token => token.text).join(" ").replace(/\s([.,!?])/g, "$1");
    }

    function topicById(topicId){
      return topics.find(topic => topic.id === topicId);
    }

    function createMcqState(topic){
      const chosen = shuffle(topic.vocab).slice(0, 6).map(item => {
        const direction = Math.random() > 0.5 ? "de-en" : "en-de";
        const correct = direction === "de-en" ? item.en : item.de;
        const pool = uniqueValues(
          shuffle(topic.vocab.filter(entry => entry !== item)).map(entry => direction === "de-en" ? entry.en : entry.de)
        ).slice(0, 3);
        const prompt = direction === "de-en"
          ? 'Wie heißt "' + item.de + '" auf Englisch?'
          : 'Wie heißt "' + item.en + '" auf Deutsch?';

        return {
          prompt,
          correct,
          options: shuffle([correct, ...pool])
        };
      });

      return {
        items: chosen,
        index: 0,
        score: 0,
        locked: false,
        selected: "",
        feedback: ""
      };
    }

    function createMatchState(topic){
      const pairs = shuffle(topic.vocab).slice(0, 6).map((item, index) => ({
        id: topic.id + "-pair-" + index,
        de: item.de,
        en: item.en
      }));

      return {
        pairs,
        options: shuffle(pairs.map(pair => pair.en)),
        selections: {},
        checked: false,
        resultText: "",
        score: 0
      };
    }

    function createTypingState(topic){
      return {
        items: shuffle(topic.vocab).slice(0, 5),
        index: 0,
        answer: "",
        locked: false,
        feedback: "",
        score: 0
      };
    }

    function buildSentenceRound(topic, sentenceIndex){
      const sentence = topic.sentences[sentenceIndex];
      return {
        prompt: sentence.prompt,
        solution: sentence.solution,
        bank: shuffle(sentence.words.map((word, index) => ({
          id: topic.id + "-word-" + sentenceIndex + "-" + index + "-" + Math.random().toString(36).slice(2, 7),
          text: word
        }))),
        built: []
      };
    }

    function createSentenceState(topic){
      return {
        index: 0,
        score: 0,
        checked: false,
        correct: false,
        message: "",
        round: buildSentenceRound(topic, 0)
      };
    }

    function createTranslateState(topic){
      return {
        items: topic.translationPractice,
        index: 0,
        answer: "",
        locked: false,
        feedback: "",
        score: 0
      };
    }

    function createTopicState(topic){
      return {
        phase: "learn",
        vocabIndex: 0,
        revealTranslation: false,
        mcq: createMcqState(topic),
        match: createMatchState(topic),
        typing: createTypingState(topic),
        sentence: createSentenceState(topic),
        translate: createTranslateState(topic)
      };
    }

    function initState(){
      topics.forEach(topic => {
        appState.topics[topic.id] = createTopicState(topic);
      });
    }

    function resetTopicPractice(topicId){
      const topic = topicById(topicId);
      appState.topics[topicId].mcq = createMcqState(topic);
      appState.topics[topicId].match = createMatchState(topic);
      appState.topics[topicId].typing = createTypingState(topic);
      appState.topics[topicId].sentence = createSentenceState(topic);
      appState.topics[topicId].translate = createTranslateState(topic);
    }

    function renderMcq(topic){
      const mcqState = appState.topics[topic.id].mcq;
      const finished = mcqState.index >= mcqState.items.length;

      if(finished){
        return `
          <div class="exercise-card">
            <div class="question-head">
              <span>Multiple Choice</span>
              <span>${mcqState.score} / ${mcqState.items.length}</span>

      }

      const question = mcqState.items[mcqState.index];

      return `
        <div class="exercise-card">
          <div class="question-head">
            <span>Multiple Choice</span>
            <span>${mcqState.index + 1} / ${mcqState.items.length}</span>
          </div>

          <div class="options">
            ${question.options.map(option => {
              let buttonClass = "option-btn";
              if(mcqState.locked){
                if(option === question.correct){
                  buttonClass += " correct";
                }else if(option === mcqState.selected){
                  buttonClass += " wrong";
                }
              }

              return `
                <button
                  class="${buttonClass}"
                  data-action="answer-mcq"
                  data-topic="${topic.id}"
                  data-value="${option.replace(/"/g, "&quot;")}"
                >
                  ${option}
                </button>
              `;
            }).join("")}
          </div>
          ${mcqState.feedback ? `<div class="feedback ${mcqState.selected === question.correct ? "good" : "bad"}">${mcqState.feedback}</div>` : ""}
          <div class="control-row">
            ${mcqState.locked ? `<button class="action-btn" data-action="next-mcq" data-topic="${topic.id}">Nächste Frage</button>` : ""}
          </div>
        </div>
      `;
    }

    function renderMatch(topic){
      const matchState = appState.topics[topic.id].match;

      return `

        </div>
      `;
    }

    function renderTyping(topic){
      const typingState = appState.topics[topic.id].typing;
      const finished = typingState.index >= typingState.items.length;

      if(finished){
        return `
          <div class="exercise-card">
            <div class="question-head">
              <span>Schreibtraining</span>
              <span>${typingState.score} / ${typingState.items.length}</span>
            </div>
            <div class="feedback good">Sehr gut! Du hast alle Schreibaufgaben bearbeitet.</div>
            <div class="control-row">
              <button class="ghost-btn" data-action="restart-typing" data-topic="${topic.id}">Schreibtraining neu starten</button>
            </div>
          </div>
        `;
      }

      const item = typingState.items[typingState.index];

      return `
        <div class="exercise-card">
          <div class="question-head">
            <span>Schreibtraining</span>
            <span>${typingState.index + 1} / ${typingState.items.length}</span>
          </div>
          <div class="question-title">Schreibe die englische Übersetzung zu: <strong>${item.de}</strong></div>
          <input
            class="input"
            type="text"
            placeholder="Deine Antwort auf Englisch"
            value="${typingState.answer.replace(/"/g, "&quot;")}"
            data-action="typing-input"
            data-topic="${topic.id}"
            ${typingState.locked ? "disabled" : ""}
          >
          ${typingState.feedback ? `<div class="feedback ${normalize(typingState.answer) === normalize(item.en) ? "good" : "bad"}">${typingState.feedback}</div>` : ""}
          <div class="control-row">
            ${typingState.locked
              ? `<button class="action-btn" data-action="next-typing" data-topic="${topic.id}">Nächstes Wort</button>`
              : `<button class="action-btn" data-action="check-typing" data-topic="${topic.id}">Antwort prüfen</button>`
            }
          </div>
        </div>
      `;
    }

    function renderSentence(topic){
      const sentenceState = appState.topics[topic.id].sentence;
      const total = topic.sentences.length;
      const round = sentenceState.round;

      const finished = sentenceState.index >= total;

      if(finished){
        return `
          <div class="exercise-card">
            <div class="question-head">
              <span>Satzbau</span>
              <span>${sentenceState.score} / ${total}</span>
            </div>
            <div class="feedback good">Du hast alle Satzbau-Aufgaben abgeschlossen.</div>
            <div class="control-row">
              <button class="ghost-btn" data-action="restart-sentence" data-topic="${topic.id}">Satzbau neu starten</button>
            </div>
          </div>
        `;
      }

      return `
        <div class="exercise-card">
          <div class="question-head">
            <span>Satzbau</span>
            <span>${sentenceState.index + 1} / ${total}</span>
          </div>
          <div class="question-title">${round.prompt}</div>
          <div class="builder-area">
            <div class="built-bank ${round.built.length ? "" : "empty"}">
              ${round.built.map(token => `
                <button class="chip" data-action="remove-word" data-topic="${topic.id}" data-word="${token.id}">
                  ${token.text}
                </button>
              `).join("")}
            </div>
            <div class="word-bank">
              ${round.bank.map(token => `
                <button class="chip" data-action="add-word" data-topic="${topic.id}" data-word="${token.id}">
                  ${token.text}
                </button>
              `).join("")}
            </div>
          </div>
          ${sentenceState.message ? `<div class="feedback ${sentenceState.correct ? "good" : "bad"}">${sentenceState.message}</div>` : ""}
          <div class="control-row">
            <button class="ghost-btn" data-action="reset-built" data-topic="${topic.id}">Zurücksetzen</button>
            ${sentenceState.checked
              ? `<button class="action-btn" data-action="next-sentence" data-topic="${topic.id}">Nächster Satz</button>`
              : `<button class="action-btn" data-action="check-sentence" data-topic="${topic.id}">Satz prüfen</button>`
            }
          </div>
        </div>
      `;
    }

    function renderPractice(topic){
      const state = appState.topics[topic.id];
      return `
        <div class="score-strip">
          <div class="score-pill">Quiz: ${state.mcq.score}/${state.mcq.items.length}</div>
          <div class="score-pill">Zuordnung: ${state.match.score}/${state.match.pairs.length}</div>
          <div class="score-pill">Schreiben: ${state.typing.score}/${state.typing.items.length}</div>
          <div class="score-pill">Satzbau: ${state.sentence.score}/${topic.sentences.length}</div>
        </div>
        <div class="exercise-grid">
          ${renderMcq(topic)}
          ${renderMatch(topic)}
          ${renderTyping(topic)}
          ${renderSentence(topic)}
        </div>
        <div class="control-row">
          <button class="ghost-btn" data-action="restart-all-practice" data-topic="${topic.id}">Alle Übungen neu starten</button>
        </div>
      `;
    }

    function renderSpeak(topic){
      const translateState = appState.topics[topic.id].translate;
      const finished = translateState.index >= translateState.items.length;

      if(finished){
        return `
          <div class="single-panel">
            <div class="panel-card speak-card">
              <div class="question-head">
                <span>Sprechen & Übersetzen</span>
                <span>${translateState.score} / ${translateState.items.length}</span>
              </div>
              <div class="feedback good">Fertig! Du hast alle Bildsätze übersetzt.</div>
              <div class="simple-note">Sprich die richtigen englischen Sätze jetzt noch einmal laut nach. Das hilft dir direkt für die mündliche Prüfung.</div>
              <div class="control-row">
                <button class="ghost-btn" data-action="restart-translate" data-topic="${topic.id}">Satztraining neu starten</button>
              </div>
            </div>
          </div>
        `;
      }

      const item = translateState.items[translateState.index];

      return `
        <div class="single-panel">
          <div class="panel-card speak-card">
            <div class="question-head">
                <span>Sprechen & Übersetzen</span>
                <span>${translateState.index + 1} / ${translateState.items.length}</span>
              </div>
            <div class="translate-prompt">
              <strong>Übersetze ins Englische:</strong>
              <p>${item.de}</p>
            </div>
            <input
              class="input"
              type="text"
              placeholder="Schreibe deinen englischen Satz hier"
              value="${translateState.answer.replace(/"/g, "&quot;")}"
              data-action="translate-input"
              data-topic="${topic.id}"
              ${translateState.locked ? "disabled" : ""}
            >
            ${translateState.feedback ? `<div class="feedback ${normalize(translateState.answer) === normalize(item.en) ? "good" : "bad"}">${translateState.feedback}</div>` : ""}
            <div class="control-row">
              ${translateState.locked
                ? `<button class="action-btn" data-action="next-translate" data-topic="${topic.id}">Nächster Satz</button>`
                : `<button class="action-btn" data-action="check-translate" data-topic="${topic.id}">Übersetzung prüfen</button>`
              }
              <button class="ghost-btn" data-action="restart-translate" data-topic="${topic.id}">Neu starten</button>
            </div>
            <div class="simple-note">Wenn du geprüft hast, sprich den richtigen englischen Satz einmal laut aus.</div>
          </div>
        </div>
      `;
    }

    function renderActiveTopic(){
      const topic = topicById(appState.activeTopic);
      const state = appState.topics[topic.id];

      let content = "";
      if(state.phase === "learn"){
        content = renderLearn(topic);
      }else if(state.phase === "practice"){
        content = renderPractice(topic);
      }else{
        content = renderSpeak(topic);
      }

      return `
        <section class="topic-stage ${topic.themeClass}">
          ${renderStageHeader(topic)}
          ${content}
        </section>
      `;
    }

    function renderApp(){
      const activeTopic = topicById(appState.activeTopic);
      document.getElementById("app").innerHTML = `
        <div class="shell">
          ${renderHeader()}
          ${renderTopicNav(activeTopic)}
          ${renderActiveTopic()}
          <p class="footer">Viel Erfolg beim Üben für deinen Topic-Based-Talk im Quali.</p>
        </div>
      `;
    }

    function switchTopic(topicId){
      appState.activeTopic = topicId;
      renderApp();
    }

    function switchPhase(topicId, phase){
      appState.topics[topicId].phase = phase;
      renderApp();
    }

    function updateVocab(topicId, direction){
      const topic = topicById(topicId);
      const state = appState.topics[topicId];
      if(direction === "next"){
        state.vocabIndex = (state.vocabIndex + 1) % topic.vocab.length;
      }else{
        state.vocabIndex = (state.vocabIndex - 1 + topic.vocab.length) % topic.vocab.length;
      }
      state.revealTranslation = false;
      renderApp();
    }

    function randomVocab(topicId){
      const topic = topicById(topicId);
      const state = appState.topics[topicId];
      state.vocabIndex = Math.floor(Math.random() * topic.vocab.length);
      state.revealTranslation = false;
      renderApp();
    }

    function toggleTranslation(topicId){
      const state = appState.topics[topicId];
      state.revealTranslation = !state.revealTranslation;
      renderApp();
    }

    function answerMcq(topicId, value){
      const mcqState = appState.topics[topicId].mcq;
      if(mcqState.locked || mcqState.index >= mcqState.items.length){
        return;
      }

      const question = mcqState.items[mcqState.index];
      mcqState.selected = value;
      mcqState.locked = true;

      if(value === question.correct){
        mcqState.score += 1;
        mcqState.feedback = "Richtig! Gute Arbeit.";
      }else{
        mcqState.feedback = 'Nicht ganz. Richtig wäre: "' + question.correct + '".';
      }

      renderApp();
    }

    function nextMcq(topicId){
      const mcqState = appState.topics[topicId].mcq;
      mcqState.index += 1;
      mcqState.locked = false;
      mcqState.selected = "";
      mcqState.feedback = "";
      renderApp();
    }

    function restartMcq(topicId){
      const topic = topicById(topicId);
      appState.topics[topicId].mcq = createMcqState(topic);
      renderApp();
    }

    function setMatchSelection(topicId, pairId, value){
      const matchState = appState.topics[topicId].match;
      matchState.selections[pairId] = value;
    }

    function checkMatch(topicId){
      const matchState = appState.topics[topicId].match;
      let correct = 0;

      matchState.pairs.forEach(pair => {
        if(matchState.selections[pair.id] === pair.en){
          correct += 1;
        }
      });

      matchState.checked = true;
      matchState.score = correct;
      matchState.resultText = correct === matchState.pairs.length
        ? "Perfekt! Alle Zuordnungen sind richtig."
        : "Du hast " + correct + " von " + matchState.pairs.length + " richtig.";

      renderApp();
    }

    function restartMatch(topicId){
      const topic = topicById(topicId);
      appState.topics[topicId].match = createMatchState(topic);
      renderApp();
    }

    function updateTypingAnswer(topicId, value){
      appState.topics[topicId].typing.answer = value;
    }

    function checkTyping(topicId){
      const typingState = appState.topics[topicId].typing;
      if(typingState.locked || typingState.index >= typingState.items.length){
        return;
      }

      const item = typingState.items[typingState.index];
      typingState.locked = true;

      if(normalize(typingState.answer) === normalize(item.en)){
        typingState.score += 1;
        typingState.feedback = "Richtig geschrieben. Sehr gut!";
      }else{
        typingState.feedback = 'Fast. Die richtige Lösung ist: "' + item.en + '".';
      }

      renderApp();
    }

    function nextTyping(topicId){
      const typingState = appState.topics[topicId].typing;
      typingState.index += 1;
      typingState.answer = "";
      typingState.locked = false;
      typingState.feedback = "";
      renderApp();
    }

    function restartTyping(topicId){
      const topic = topicById(topicId);
      appState.topics[topicId].typing = createTypingState(topic);
      renderApp();
    }

    function updateTranslateAnswer(topicId, value){
      appState.topics[topicId].translate.answer = value;
    }

    function checkTranslate(topicId){
      const translateState = appState.topics[topicId].translate;
      if(translateState.locked || translateState.index >= translateState.items.length){
        return;
      }

      const item = translateState.items[translateState.index];
      translateState.locked = true;

      if(normalize(translateState.answer) === normalize(item.en)){
        translateState.score += 1;
        translateState.feedback = "Richtig! Genau so kannst du den Satz sagen.";
      }else{
        translateState.feedback = 'Fast. Eine passende Lösung ist: "' + item.en + '".';
      }

      renderApp();
    }

    function nextTranslate(topicId){
      const translateState = appState.topics[topicId].translate;
      translateState.index += 1;
      translateState.answer = "";
      translateState.locked = false;
      translateState.feedback = "";
      renderApp();
    }

    function restartTranslate(topicId){
      const topic = topicById(topicId);
      appState.topics[topicId].translate = createTranslateState(topic);
      renderApp();
    }

    function addWord(topicId, wordId){
      const sentenceState = appState.topics[topicId].sentence;
      if(sentenceState.checked){
        return;
      }

      const wordIndex = sentenceState.round.bank.findIndex(token => token.id === wordId);
      if(wordIndex === -1){
        return;
      }

      const [token] = sentenceState.round.bank.splice(wordIndex, 1);
      sentenceState.round.built.push(token);
      renderApp();
    }

    function removeWord(topicId, wordId){
      const sentenceState = appState.topics[topicId].sentence;
      if(sentenceState.checked){
        return;
      }

      const builtIndex = sentenceState.round.built.findIndex(token => token.id === wordId);
      if(builtIndex === -1){
        return;
      }

      const [token] = sentenceState.round.built.splice(builtIndex, 1);
      sentenceState.round.bank.push(token);
      renderApp();
    }

    function resetBuilt(topicId){
      const topic = topicById(topicId);
      const sentenceState = appState.topics[topicId].sentence;
      sentenceState.checked = false;
      sentenceState.correct = false;
      sentenceState.message = "";
      sentenceState.round = buildSentenceRound(topic, sentenceState.index);
      renderApp();
    }

    function checkSentence(topicId){
      const sentenceState = appState.topics[topicId].sentence;
      if(sentenceState.checked){
        return;
      }

      const builtSentence = composeSentence(sentenceState.round.built);
      sentenceState.checked = true;

      if(normalize(builtSentence) === normalize(sentenceState.round.solution)){
        sentenceState.correct = true;
        sentenceState.score += 1;
        sentenceState.message = "Richtig! Dein Satz ist korrekt.";
      }else{
        sentenceState.correct = false;
        sentenceState.message = 'Noch nicht ganz. Die Lösung ist: "' + sentenceState.round.solution + '".';
      }

      renderApp();
    }

    function nextSentence(topicId){
      const topic = topicById(topicId);
      const sentenceState = appState.topics[topicId].sentence;
      sentenceState.index += 1;
      sentenceState.checked = false;
      sentenceState.correct = false;
      sentenceState.message = "";

      if(sentenceState.index < topic.sentences.length){
        sentenceState.round = buildSentenceRound(topic, sentenceState.index);
      }

      renderApp();
    }

    function restartSentence(topicId){
      const topic = topicById(topicId);
      appState.topics[topicId].sentence = createSentenceState(topic);
      renderApp();
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("[data-action]");
      if(!target){
        return;
      }

      const action = target.dataset.action;
      const topicId = target.dataset.topic;

      if(action === "switch-topic"){
        switchTopic(topicId);
      }else if(action === "switch-phase"){
        switchPhase(topicId, target.dataset.phase);
      }else if(action === "prev-vocab"){
        updateVocab(topicId, "prev");
      }else if(action === "next-vocab"){
        updateVocab(topicId, "next");
      }else if(action === "random-vocab"){
        randomVocab(topicId);
      }else if(action === "toggle-translation"){
        toggleTranslation(topicId);
      }else if(action === "answer-mcq"){
        answerMcq(topicId, target.dataset.value);
      }else if(action === "next-mcq"){
        nextMcq(topicId);
      }else if(action === "restart-mcq"){
        restartMcq(topicId);
      }else if(action === "check-match"){
        checkMatch(topicId);
      }else if(action === "restart-match"){
        restartMatch(topicId);
      }else if(action === "check-typing"){
        checkTyping(topicId);
      }else if(action === "next-typing"){
        nextTyping(topicId);
      }else if(action === "restart-typing"){
        restartTyping(topicId);
      }else if(action === "check-translate"){
        checkTranslate(topicId);
      }else if(action === "next-translate"){
        nextTranslate(topicId);
      }else if(action === "restart-translate"){
        restartTranslate(topicId);
      }else if(action === "add-word"){
        addWord(topicId, target.dataset.word);
      }else if(action === "remove-word"){
        removeWord(topicId, target.dataset.word);
      }else if(action === "reset-built"){
        resetBuilt(topicId);
      }else if(action === "check-sentence"){
        checkSentence(topicId);
      }else if(action === "next-sentence"){
        nextSentence(topicId);
      }else if(action === "restart-sentence"){
        restartSentence(topicId);
      }else if(action === "restart-all-practice"){
        resetTopicPractice(topicId);
        renderApp();
      }
    });

    document.addEventListener("change", event => {
      const target = event.target;
      if(target.dataset.action === "select-match"){
        setMatchSelection(target.dataset.topic, target.dataset.pair, target.value);
      }
    });

    document.addEventListener("input", event => {
      const target = event.target;
      if(target.dataset.action === "typing-input"){
        updateTypingAnswer(target.dataset.topic, target.value);
      }else if(target.dataset.action === "translate-input"){
        updateTranslateAnswer(target.dataset.topic, target.value);
      }
    });

    document.addEventListener("keydown", event => {
      const activeState = appState.topics[appState.activeTopic];
      if(activeState.phase !== "learn"){
        return;
      }

      if(event.key === "ArrowRight"){
        updateVocab(appState.activeTopic, "next");
      }else if(event.key === "ArrowLeft"){
        updateVocab(appState.activeTopic, "prev");
      }
    });

    initState();
    renderApp();
  </script>
</body>
</html>
